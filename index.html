<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>National Car Mart — Dealer OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Oswald:wght@500;600;700&family=Barlow+Condensed:wght@600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <link href="/src/main.css" rel="stylesheet" />
</head>

<body>
    <div id="root"></div>
    <script>
      // Inject a localStorage-backed KV mock so the app renders without the
      // GitHub Spark backend (which returns 403 in non-Spark environments).
      (function () {
        var _sparkInternal = {};
        var kvStore = {};
        var localKv = {
          get: function (key) { return Promise.resolve(key in kvStore ? kvStore[key] : null); },
          set: function (key, value) { kvStore[key] = value; return Promise.resolve(); },
          delete: function (key) { delete kvStore[key]; return Promise.resolve(); },
          getKeys: function () { return Promise.resolve(Object.keys(kvStore)); },
          getAll: function () { return Promise.resolve(Object.assign({}, kvStore)); }
        };
        Object.defineProperty(window, 'spark', {
          get: function () { return _sparkInternal; },
          set: function (value) {
            if (value && typeof value === 'object') {
              value.kv = localKv;
            }
            _sparkInternal = value || {};
            _sparkInternal.kv = localKv;
          },
          configurable: true
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
