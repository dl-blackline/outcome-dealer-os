[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "20"
  # @github/spark peer-dep declares vite@^6 but the plugin is runtime-compatible
  # with vite 7; --legacy-peer-deps lets npm resolve past the constraint.
  NPM_FLAGS = "--legacy-peer-deps"

# SPA fallback — every path serves index.html so the hash/client router works
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co https://api.sendgrid.com https://api.openai.com; font-src 'self' data:; frame-ancestors 'none'"

# Force HTTPS
[[redirects]]
  from = "http://outcome-dealer-os.netlify.app/*"
  to = "https://outcome-dealer-os.netlify.app/:splat"
  status = 301
  force = true
