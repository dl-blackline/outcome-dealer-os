[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # @github/spark peer-dep declares vite@^6 but the plugin is runtime-compatible
  # with vite 7; --legacy-peer-deps lets npm resolve past the constraint.
  NPM_FLAGS = "--legacy-peer-deps"

# SPA fallback — every path serves index.html so the hash/client router works
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
